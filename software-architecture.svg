<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Aisle Whisper MVP Software Architecture</title>
  <desc id="desc">Architecture diagram for the Aisle Whisper fullstack application including PWA frontend, backend relay, Gemini integrations, and deployment targets.</desc>

  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .zone { fill: #ffffff; stroke: #cfd8e3; stroke-width: 2; rx: 14; }
      .zoneTitle { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #21324a; }
      .card { fill: #ffffff; stroke: #9db2c8; stroke-width: 2; rx: 10; }
      .cardBlue { fill: #ecf5ff; stroke: #63a2d8; stroke-width: 2; rx: 10; }
      .cardGreen { fill: #ebfbf0; stroke: #5eb685; stroke-width: 2; rx: 10; }
      .cardAmber { fill: #fff8e9; stroke: #e0b24e; stroke-width: 2; rx: 10; }
      .h1 { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #1f2f46; }
      .h2 { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #21324a; }
      .text { font: 13px 'Segoe UI', Arial, sans-serif; fill: #2d3e55; }
      .small { font: 12px 'Segoe UI', Arial, sans-serif; fill: #4a5d77; }
      .label { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #1f2f46; }
      .line { stroke: #4a6f95; stroke-width: 2.2; fill: none; }
      .lineDash { stroke: #4a6f95; stroke-width: 2; stroke-dasharray: 7 6; fill: none; }
      .lineData { stroke: #327a57; stroke-width: 2.4; fill: none; }
      .lineWarn { stroke: #9a6a15; stroke-width: 2.2; fill: none; }
      .pill { fill: #e7eef7; stroke: #a9bdd4; stroke-width: 1.2; rx: 6; }
    </style>

    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#4a6f95" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#327a57" />
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#9a6a15" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="920" />

  <text x="42" y="54" class="h1">Aisle Whisper MVP - Software Architecture (Frontend + Backend)</text>
  <text x="42" y="80" class="text">Reduced scope: camera-driven overlay detection + checklist flow. Voice UI and print-tag flow are currently disabled.</text>

  <rect class="zone" x="30" y="110" width="420" height="700" />
  <text x="50" y="145" class="zoneTitle">Client / Device</text>

  <rect class="cardBlue" x="50" y="170" width="380" height="270" />
  <text x="68" y="200" class="h2">Aisle Whisper PWA (React + Vite + TS)</text>
  <text x="68" y="225" class="text">- Camera stream (getUserMedia)</text>
  <text x="68" y="247" class="text">- Overlay rendering on canvas</text>
  <text x="68" y="269" class="text">- Detection focus selector:</text>
  <text x="88" y="289" class="small">all | alignment | gaps | restock</text>
  <text x="68" y="312" class="text">- Buttons:</text>
  <text x="88" y="332" class="small">Generate Checklist (freeze snapshot)</text>
  <text x="88" y="350" class="small">Audit Shelf (open summary view)</text>
  <text x="68" y="374" class="text">- Local storage:</text>
  <text x="88" y="394" class="small">settings + checklist snapshot image</text>

  <rect class="card" x="50" y="470" width="380" height="140" />
  <text x="68" y="500" class="h2">Mobile Browser / Installed PWA</text>
  <text x="68" y="523" class="text">- Loads app shell + manifest + service worker</text>
  <text x="68" y="545" class="text">- Sends WS frames and REST requests</text>
  <text x="68" y="567" class="text">- Displays overlay/debug state for validation</text>

  <rect class="cardAmber" x="50" y="635" width="380" height="150" />
  <text x="68" y="665" class="h2">Frontend Hosting</text>
  <text x="68" y="688" class="text">Firebase Hosting</text>
  <text x="68" y="710" class="small">- Serves built assets from aw-pwa/dist</text>
  <text x="68" y="728" class="small">- SPA fallback + PWA static files</text>

  <rect class="zone" x="490" y="110" width="510" height="700" />
  <text x="510" y="145" class="zoneTitle">Backend / API Layer</text>

  <rect class="cardGreen" x="510" y="170" width="470" height="295" />
  <text x="528" y="200" class="h2">aw-backend (Node + Express + WS on Cloud Run)</text>
  <text x="528" y="225" class="text">- WS bridge endpoint: /ws/live</text>
  <text x="528" y="247" class="text">- Receives: video-frame + text-command (focus)</text>
  <text x="528" y="269" class="text">- Applies strict focus prompt + label filtering</text>
  <text x="548" y="289" class="small">Allowed labels by focus:</text>
  <text x="568" y="307" class="small">all: GAP, MISALIGNED, LOW_STOCK, OUT_OF_PLACE</text>
  <text x="568" y="325" class="small">alignment: MISALIGNED</text>
  <text x="568" y="343" class="small">gaps: GAP</text>
  <text x="568" y="361" class="small">restock: GAP, LOW_STOCK</text>
  <text x="528" y="387" class="text">- Emits overlay-update messages back to PWA</text>
  <text x="528" y="409" class="text">- REST endpoint: POST /tool/create-checklist</text>
  <text x="548" y="429" class="small">Returns normalized checklist JSON + totals</text>

  <rect class="card" x="510" y="490" width="470" height="130" />
  <text x="528" y="520" class="h2">Diagnostics / Compliance</text>
  <text x="528" y="543" class="text">- GET /health</text>
  <text x="528" y="565" class="text">- GET /health/genai-sdk (explicit @google/genai usage)</text>
  <text x="528" y="587" class="small">Validates SDK wiring and active model response.</text>

  <rect class="cardAmber" x="510" y="645" width="470" height="140" />
  <text x="528" y="675" class="h2">Cloud Run Runtime</text>
  <text x="528" y="698" class="text">- Deployed service: aw-backend (us-central1)</text>
  <text x="528" y="720" class="small">- Env vars for model config and PWA origin</text>
  <text x="528" y="738" class="small">- Secret Manager: GOOGLE_API_KEY</text>

  <rect class="zone" x="1040" y="110" width="330" height="700" />
  <text x="1060" y="145" class="zoneTitle">AI Services</text>

  <rect class="cardBlue" x="1060" y="170" width="290" height="200" />
  <text x="1078" y="200" class="h2">Gemini Live Session</text>
  <text x="1078" y="223" class="text">- Realtime session transport via WS</text>
  <text x="1078" y="245" class="text">- Receives frame/audio realtime input</text>
  <text x="1078" y="267" class="text">- Relay path can stream model events</text>
  <text x="1078" y="289" class="small">Configured model: flash native-audio variant</text>

  <rect class="cardGreen" x="1060" y="400" width="290" height="220" />
  <text x="1078" y="430" class="h2">Google GenAI SDK</text>
  <text x="1078" y="453" class="text">- Sidecar frame analysis call</text>
  <text x="1078" y="475" class="text">- Strict JSON detection contract</text>
  <text x="1078" y="497" class="text">- Used for focused overlay detections</text>
  <text x="1078" y="519" class="small">Model example: gemini-2.5-flash</text>
  <text x="1078" y="541" class="small">SDK: @google/genai</text>

  <rect class="card" x="1060" y="650" width="290" height="135" />
  <text x="1078" y="680" class="h2">Security Boundary</text>
  <text x="1078" y="703" class="text">API key kept server-side only.</text>
  <text x="1078" y="725" class="small">No direct client key exposure.</text>

  <path class="line" d="M430 290 C470 290, 480 290, 510 290" marker-end="url(#arrowBlue)" />
  <text x="442" y="276" class="label">WebSocket /ws/live</text>
  <text x="442" y="294" class="small">video-frame + text-command(focus)</text>

  <path class="lineData" d="M510 410 C468 410, 470 410, 430 410" marker-end="url(#arrowGreen)" />
  <text x="440" y="397" class="label">overlay-update</text>
  <text x="440" y="415" class="small">filtered detections + metadata</text>

  <path class="line" d="M430 730 C470 730, 470 700, 510 700" marker-end="url(#arrowBlue)" />
  <text x="440" y="688" class="label">HTTP POST /tool/create-checklist</text>

  <path class="lineData" d="M510 740 C470 740, 470 770, 430 770" marker-end="url(#arrowGreen)" />
  <text x="440" y="758" class="label">Checklist JSON response</text>

  <path class="lineDash" d="M980 250 C1010 250, 1025 250, 1060 250" marker-end="url(#arrowBlue)" />
  <text x="996" y="236" class="label">Realtime WS bridge</text>

  <path class="lineWarn" d="M980 510 C1010 510, 1025 510, 1060 510" marker-end="url(#arrowAmber)" />
  <text x="988" y="496" class="label">generateContent (strict prompt)</text>

  <rect class="pill" x="40" y="842" width="1320" height="52" />
  <text x="60" y="873" class="text">MVP flow: Select focus -> stream shelf frames -> backend enforces strict prompt + focus filter -> overlay appears -> Generate Checklist freezes snapshot -> Audit Shelf summarizes findings.</text>
</svg>
